apiVersion: apps/v1
kind: Deployment
metadata:
  name: orp-or-planner-ufe
spec:
  replicas: 1
  selector:
    matchLabels:
      pod: orp-or-planner-ufe-label
  template:
    metadata:
      labels:
        pod: orp-or-planner-ufe-label
    spec:
      containers:
        - name: orp-or-planner-ufe
          image: xchromek/orp-or-planner-ufe:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "32M"
              cpu: "0.1"
            limits:
              memory: "320M"
              cpu: "0.3"
