apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: orp-azure-install
  namespace: wac-hospital
spec:
  wait: true
  dependsOn:
    - name: orp-azure-prepare
  interval: 120s
  path: clusters/azure/install
  prune: true
  sourceRef:
    kind: GitRepository
    name: orp-azure-gitops-repo

