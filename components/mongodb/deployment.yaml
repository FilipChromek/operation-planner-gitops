apiVersion: apps/v1
kind: Deployment
metadata:
  name: &PODNAME mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      pod: *PODNAME
  template:
    metadata:
      labels:
        pod: *PODNAME
    spec:
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: mongo-pvc
      containers:
        - name: *PODNAME
          image: mongo:8.2.6
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb-port
              containerPort: 27017
          volumeMounts:
            - name: db-data
              mountPath: /data/db
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-auth
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-auth
                  key: password
          resources:
            requests:
              memory: "512Mi"
              cpu: "0.05"
            limits:
              memory: "2Gi"
              cpu: "0.5"
